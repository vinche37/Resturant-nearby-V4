<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="吃什麼">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0a1e">
<title>吃什麼</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #0b0718;
  --bg1: #120d24;
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.10);
  --glass-hover: rgba(255,255,255,0.10);
  --p1: #c84bff;
  --p2: #ff3fa0;
  --p3: #7b5fff;
  --text: #f0eaff;
  --muted: rgba(240,234,255,0.45);
  --muted2: rgba(240,234,255,0.22);
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}

body {
  background: var(--bg0);
  color: var(--text);
  font-family: 'Outfit', 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  padding-top: var(--safe-top);
  overflow-x: hidden;
  position: relative;
}

/* ── BACKGROUND BLOBS ── */
.blobs {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.blob {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: .55;
}
.blob-1 {
  width: 340px; height: 340px;
  background: radial-gradient(circle, #8b2fc9 0%, transparent 70%);
  top: -80px; left: -80px;
  animation: drift1 12s ease-in-out infinite alternate;
}
.blob-2 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, #c0185e 0%, transparent 70%);
  top: 30%; right: -100px;
  animation: drift2 15s ease-in-out infinite alternate;
}
.blob-3 {
  width: 260px; height: 260px;
  background: radial-gradient(circle, #4a2fa0 0%, transparent 70%);
  bottom: 10%; left: -60px;
  animation: drift1 10s ease-in-out infinite alternate-reverse;
}
@keyframes drift1 {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px,30px) scale(1.1); }
}
@keyframes drift2 {
  from { transform: translate(0,0) scale(1.05); }
  to   { transform: translate(-30px,40px) scale(.95); }
}

/* ── PAGE ── */
.page {
  position: relative; z-index: 1;
  max-width: 430px; margin: 0 auto;
  padding: 24px 20px calc(36px + var(--safe-bot));
  display: flex; flex-direction: column; gap: 18px;
  min-height: 100vh; min-height: -webkit-fill-available;
}

/* ── GLASS MIXIN ── */
.glass {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
}

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
}
.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.greeting {
  font-size: 11px; font-weight: 300; color: var(--muted);
  letter-spacing: 1.5px; text-transform: uppercase;
}
.clock {
  font-size: 20px; font-weight: 700; color: var(--text);
  letter-spacing: -1px; line-height: 1;
}
.meal-badge {
  font-size: 11px; font-weight: 600;
  padding: 5px 12px; border-radius: 20px;
  background: linear-gradient(135deg, rgba(200,75,255,.25), rgba(255,63,160,.2));
  border: 1px solid rgba(200,75,255,.35);
  color: #e0b0ff;
  letter-spacing: .5px;
}

/* ── LOCATION BAR ── */
.loc-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
}
.loc-icon {
  width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(200,75,255,.3), rgba(123,95,255,.3));
  border: 1px solid rgba(200,75,255,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}
.loc-info { flex: 1; min-width: 0; }
.loc-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 400; }
.loc-name {
  font-size: 13px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.loc-status {
  font-size: 10px; font-weight: 600; letter-spacing: .5px;
  padding: 3px 9px; border-radius: 10px;
  background: rgba(6,193,103,.15);
  border: 1px solid rgba(6,193,103,.3);
  color: #4dffa0; flex-shrink: 0;
}
.loc-status.pending {
  background: rgba(255,200,0,.1); border-color: rgba(255,200,0,.2); color: #ffd75e;
}

/* ── HERO ── */
.hero { padding: 8px 4px; }
.hero-sub {
  font-size: 11px; font-weight: 400; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
}
.hero-title {
  font-size: clamp(2.6rem, 12vw, 3.6rem);
  font-weight: 800; line-height: .95; letter-spacing: -2px; color: var(--text);
}
.hero-title .grad {
  background: linear-gradient(135deg, var(--p1), var(--p2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── RESULT CARD ── */
.result-wrap { min-height: 130px; }

.skeleton {
  display: flex; flex-direction: column; gap: 10px; padding: 20px;
}
.skel-line {
  border-radius: 6px;
  background: linear-gradient(90deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.10) 50%, rgba(255,255,255,.06) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.8s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-line:nth-child(1){ height:16px; width:65%; }
.skel-line:nth-child(2){ height:12px; width:40%; }
.skel-line:nth-child(3){ height:12px; width:50%; margin-top:4px; }

.rcard { display: none; flex-direction: column; overflow: hidden; }
.rcard.show { display: flex; animation: cardIn .55s cubic-bezier(.34,1.4,.64,1) both; }
@keyframes cardIn {
  0%  { opacity:0; transform:scale(.9) translateY(16px); }
  100%{ opacity:1; transform:scale(1)  translateY(0);    }
}

.rcard-header {
  padding: 20px 20px 16px;
  background: linear-gradient(135deg, rgba(200,75,255,.12), rgba(255,63,160,.08));
  position: relative; overflow: hidden;
}
.rcard-header::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,75,255,.2), transparent 70%);
}
.rcard-emoji-row {
  display: flex; align-items: flex-start; gap: 14px; position: relative;
}
.rcard-emoji {
  font-size: 3rem; line-height: 1; flex-shrink: 0;
  filter: drop-shadow(0 4px 12px rgba(200,75,255,.5));
}
.rcard-text { flex: 1; min-width: 0; }
.rcard-name {
  font-size: 1.35rem; font-weight: 700; color: var(--text);
  letter-spacing: -.5px; line-height: 1.2;
}
.rcard-cuisine {
  font-size: 11px; color: var(--muted); letter-spacing: 1px;
  text-transform: uppercase; margin-top: 4px; font-weight: 400;
}
.rcard-addr {
  font-size: 12px; color: var(--muted); margin-top: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dist-pill {
  position: absolute; top: 0; right: 0;
  background: linear-gradient(135deg, var(--p1), var(--p2));
  color: #fff; font-size: 12px; font-weight: 700;
  padding: 4px 10px; border-radius: 0 0 0 12px;
  letter-spacing: -.3px;
}

.rcard-footer {
  display: flex; align-items: center;
  padding: 14px 20px; gap: 14px;
  border-top: 1px solid var(--glass-border);
}
.eta-box { display: flex; flex-direction: column; gap: 2px; }
.eta-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.eta-val {
  font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.5px;
}
.btn-order {
  flex: 1;
  background: linear-gradient(135deg, var(--p1), var(--p2));
  color: #fff; border: none; border-radius: 14px;
  padding: 14px; font-family: 'Outfit','Noto Sans TC',sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
  letter-spacing: .3px;
  box-shadow: 0 4px 20px rgba(200,75,255,.35);
  transition: transform .15s, filter .15s; touch-action: manipulation;
}
.btn-order:active { transform: scale(.96); filter: brightness(.88); }

/* ── DICE BUTTON ── */
.dice-section { display: flex; flex-direction: column; gap: 12px; }

.dice-btn {
  width: 100%; height: 80px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 14px;
  touch-action: manipulation; position: relative; overflow: hidden;
  transition: transform .12s, border-color .2s;
}
/* gradient border glow on idle */
.dice-btn::before {
  content: '';
  position: absolute; inset: -1px; border-radius: 21px; z-index: -1;
  background: linear-gradient(135deg, var(--p1), var(--p2), var(--p3));
  opacity: 0; transition: opacity .3s;
}
.dice-btn:hover::before, .dice-btn:focus::before { opacity: 1; }
.dice-btn::after {
  content: '';
  position: absolute; inset: 0; border-radius: 20px;
  background: linear-gradient(135deg, rgba(200,75,255,.08), rgba(255,63,160,.05));
  pointer-events: none;
}
.dice-btn:active { transform: scale(.97); }
.dice-btn.rolling {
  border-color: rgba(200,75,255,.5);
  animation: btnGlow .7s ease;
}
@keyframes btnGlow {
  0%,100%{ box-shadow: none; }
  50%{ box-shadow: 0 0 30px rgba(200,75,255,.4), 0 0 60px rgba(255,63,160,.2); }
}

.dice-icon {
  font-size: 2.2rem;
  filter: drop-shadow(0 2px 8px rgba(200,75,255,.6));
  display: inline-block;
}
.dice-btn.rolling .dice-icon { animation: diceRoll .7s ease; }
@keyframes diceRoll {
  0%  { transform: rotate(0)    scale(1); }
  25% { transform: rotate(-25deg) scale(.85); }
  70% { transform: rotate(380deg) scale(1.2); }
  100%{ transform: rotate(360deg) scale(1); }
}
.dice-label {
  display: flex; flex-direction: column; gap: 2px;
}
.dice-main {
  font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: -.3px;
}
.dice-hint { font-size: 11px; color: var(--muted); font-weight: 300; }

/* ── INSTALL HINT ── */
.install-hint {
  text-align: center; font-size: 12px; color: var(--muted);
  padding: 10px 14px; line-height: 1.6; display: none;
}
.install-hint.show { display: block; }
.install-hint strong { color: #e0b0ff; }

/* ── PERMISSION OVERLAY ── */
.perm-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(11,7,24,.88);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px; text-align: center; gap: 16px;
}
.perm-overlay.gone { display: none; }
.perm-glow {
  width: 100px; height: 100px; border-radius: 50%;
  background: linear-gradient(135deg, var(--p1), var(--p2));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem;
  box-shadow: 0 0 60px rgba(200,75,255,.5);
  margin-bottom: 8px;
}
.perm-title {
  font-size: 1.5rem; font-weight: 700; color: var(--text); letter-spacing: -.5px;
}
.perm-desc { font-size: 14px; color: var(--muted); line-height: 1.7; }
.perm-desc strong { color: var(--text); }
.btn-allow {
  background: linear-gradient(135deg, var(--p1), var(--p2));
  color: #fff; border: none; border-radius: 16px;
  padding: 16px 44px; font-family: 'Outfit','Noto Sans TC',sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px;
  box-shadow: 0 4px 24px rgba(200,75,255,.4);
  transition: transform .15s; touch-action: manipulation;
}
.btn-allow:active { transform: scale(.96); }

/* ── LOADING OVERLAY ── */
.load-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg0);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
}
.load-overlay.gone { display: none; }
.load-ring {
  width: 52px; height: 52px;
  border: 3px solid rgba(255,255,255,.08);
  border-top-color: var(--p1);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { font-size: 13px; color: var(--muted); font-weight: 300; letter-spacing: 1px; }
/* ── CATEGORY SELECTOR ── */
.cat-section { display: flex; flex-direction: column; gap: 10px; }
.cat-label {
  font-size: 11px; font-weight: 400; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase;
}
.cat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.cat-btn {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 16px; padding: 14px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer; touch-action: manipulation;
  transition: border-color .2s, background .2s, transform .12s;
}
.cat-btn:active { transform: scale(.94); }
.cat-btn.active {
  background: linear-gradient(135deg, rgba(200,75,255,.18), rgba(255,63,160,.12));
  border-color: rgba(200,75,255,.55);
  box-shadow: 0 0 20px rgba(200,75,255,.2);
}
.cat-emoji { font-size: 1.7rem; line-height: 1; }
.cat-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  letter-spacing: .3px;
}
.cat-btn.active .cat-name { color: #e8b0ff; }
.cat-count {
  font-size: 10px; color: var(--muted2);
  font-family: 'Outfit', monospace; font-weight: 300;
}
.cat-btn.active .cat-count { color: rgba(220,160,255,.6); }
</style>
</head>
<body>

<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- Loading -->
<div class="load-overlay" id="loadOverlay">
  <div class="load-ring"></div>
  <div class="load-text" id="loadText">定位中...</div>
</div>

<!-- Permission -->
<div class="perm-overlay gone" id="permOverlay">
  <div class="perm-glow">📍</div>
  <div class="perm-title">需要你的位置</div>
  <div class="perm-desc">才能找到附近的<strong>真實餐廳</strong><br>請允許取得定位</div>
  <button class="btn-allow" onclick="requestGPS()">允許定位</button>
</div>

<div class="page">

  <!-- Top bar -->
  <div class="glass topbar">
    <div class="topbar-left">
      <div class="greeting">Hi，今天</div>
      <div class="clock" id="clock">--:--</div>
    </div>
    <div class="meal-badge" id="mealBadge">偵測中</div>
  </div>

  <!-- Location -->
  <div class="glass loc-bar">
    <div class="loc-icon">📍</div>
    <div class="loc-info">
      <div class="loc-label">你的位置</div>
      <div class="loc-name" id="locName">定位中...</div>
    </div>
    <div class="loc-status pending" id="locStatus">等待</div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-sub">附近餐廳推薦</div>
    <div class="hero-title">今天<br>吃<span class="grad">什麼</span>？</div>
  </div>

  <!-- Result -->
  <div class="result-wrap">
    <div class="glass skeleton" id="skeleton">
      <div class="skel-line"></div>
      <div class="skel-line"></div>
      <div class="skel-line"></div>
    </div>
    <div class="glass rcard" id="rcard">
      <div class="rcard-header">
        <div class="dist-pill" id="rcDist">—</div>
        <div class="rcard-emoji-row">
          <div class="rcard-emoji" id="rcEmoji">🍽️</div>
          <div class="rcard-text">
            <div class="rcard-name" id="rcName">—</div>
            <div class="rcard-cuisine" id="rcCuisine">—</div>
            <div class="rcard-addr" id="rcAddr">—</div>
          </div>
        </div>
      </div>
      <div class="rcard-footer">
        <div class="eta-box">
          <div class="eta-label">預估外送</div>
          <div class="eta-val" id="rcEta">—</div>
        </div>
        <button class="btn-order" onclick="openUber()">Uber Eats 訂餐 →</button>
      </div>
    </div>
  </div>

  <!-- Install hint -->
  <div class="install-hint" id="installHint">
    💡 Safari → <strong>分享</strong> → 加入主畫面，解鎖完整 GPS
  </div>

  <!-- Category selector -->
  <div class="cat-section">
    <div class="cat-label">選一個類型</div>
    <div class="cat-row">
      <button class="cat-btn" id="cat-restaurant" onclick="selectCat('restaurant')">
        <span class="cat-emoji">🍽️</span>
        <span class="cat-name">餐廳</span>
        <span class="cat-count" id="cnt-restaurant">—</span>
      </button>
      <button class="cat-btn" id="cat-fastfood" onclick="selectCat('fastfood')">
        <span class="cat-emoji">🍟</span>
        <span class="cat-name">速食店</span>
        <span class="cat-count" id="cnt-fastfood">—</span>
      </button>
      <button class="cat-btn" id="cat-drinks" onclick="selectCat('drinks')">
        <span class="cat-emoji">🧋</span>
        <span class="cat-name">飲料店</span>
        <span class="cat-count" id="cnt-drinks">—</span>
      </button>
    </div>
  </div>

  <!-- Dice -->
  <div class="dice-section">
    <button class="dice-btn" id="diceBtn" onclick="roll()">
      <span class="dice-icon">🎲</span>
      <div class="dice-label">
        <span class="dice-main">幫我決定</span>
        <span class="dice-hint" id="diceHint">先選上方類型</span>
      </div>
    </button>
  </div>

</div>

<script>
// ── CUISINE MAP ──────────────────────────────────
const CM={
  taiwanese:{l:'台式',e:'🍱'},noodle:{l:'麵食',e:'🍜'},ramen:{l:'拉麵',e:'🍜'},
  rice:{l:'米食',e:'🍚'},dumpling:{l:'水餃',e:'🥟'},dim_sum:{l:'港式',e:'🥟'},
  cantonese:{l:'港式',e:'🥟'},hotpot:{l:'火鍋',e:'🫕'},bbq:{l:'燒烤',e:'🍢'},
  japanese:{l:'日式',e:'🍣'},sushi:{l:'壽司',e:'🍣'},korean:{l:'韓式',e:'🥘'},
  chinese:{l:'中式',e:'🥢'},american:{l:'美式',e:'🍔'},burger:{l:'漢堡',e:'🍔'},
  pizza:{l:'披薩',e:'🍕'},italian:{l:'義式',e:'🍝'},steak:{l:'牛排',e:'🥩'},
  western:{l:'西式',e:'🥗'},thai:{l:'泰式',e:'🌶️'},vietnamese:{l:'越式',e:'🍲'},
  indian:{l:'印度',e:'🍛'},fast_food:{l:'速食',e:'🍟'},sandwich:{l:'三明治',e:'🥪'},
  coffee_shop:{l:'咖啡',e:'☕'},cafe:{l:'咖啡',e:'☕'},ice_cream:{l:'甜點',e:'🍦'},
  dessert:{l:'甜點',e:'🍰'},bubble_tea:{l:'手搖',e:'🧋'},
  breakfast:{l:'早餐',e:'🥚'},bakery:{l:'麵包',e:'🥐'},
};
const DEF={l:'餐廳',e:'🍽️'};
const PREFS={
  breakfast:['早餐','咖啡','麵包','三明治'],
  brunch:   ['早餐','咖啡','西式','麵包'],
  lunch:    ['台式','麵食','米食','日式','中式','韓式','越式','泰式','港式'],
  afternoon:['咖啡','甜點','手搖','麵包'],
  dinner:   ['台式','日式','韓式','火鍋','牛排','燒烤','港式','中式','泰式','印度','義式'],
  latenight:['台式','麵食','漢堡','披薩','速食','火鍋'],
};
const MEALS={
  breakfast:'早餐',brunch:'早午餐',lunch:'午餐',
  afternoon:'下午茶',dinner:'晚餐',latenight:'宵夜'
};

// ── STATE ────────────────────────────────────────
let lat=null,lng=null,locReady=false,allRest=[],rolling=false,currentRes=null;

// ── CLOCK ────────────────────────────────────────
function getMeal(){
  const h=new Date().getHours();
  if(h>=6&&h<10)return'breakfast';if(h>=10&&h<11)return'brunch';
  if(h>=11&&h<14)return'lunch';if(h>=14&&h<17)return'afternoon';
  if(h>=17&&h<22)return'dinner';return'latenight';
}
function tick(){
  const now=new Date(),p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent=`${p(now.getHours())}:${p(now.getMinutes())}`;
  document.getElementById('mealBadge').textContent=MEALS[getMeal()]||'';
}

// ── LOCATION ─────────────────────────────────────
const $=id=>document.getElementById(id);
function isIOS(){return/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream}
function isStandalone(){return window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches}
function setLoad(t){$('loadText').textContent=t;$('loadOverlay').classList.remove('gone')}
function hideLoad(){$('loadOverlay').classList.add('gone')}
function showPerm(){$('permOverlay').classList.remove('gone')}
function hidePerm(){$('permOverlay').classList.add('gone')}

function setLoc(la,lo,name){
  lat=la;lng=lo;locReady=true;
  $('locName').textContent=name;
  $('locStatus').textContent='GPS ✓';
  $('locStatus').classList.remove('pending');
  hidePerm();
}

function requestGPS(){
  hidePerm();setLoad('取得 GPS...');
  navigator.geolocation.getCurrentPosition(
    p=>geoOK(p.coords.latitude,p.coords.longitude),
    _=>fallbackIP(),
    {enableHighAccuracy:true,timeout:12000,maximumAge:60000}
  );
}

async function geoOK(la,lo){
  setLoad('解析地址...');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${la}&lon=${lo}&format=json&accept-language=zh-TW`);
    const d=await r.json(),a=d.address||{};
    const name=[a.suburb||a.neighbourhood||a.quarter||a.village,
                a.city||a.town||a.county].filter(Boolean).slice(0,2).join(' ');
    setLoc(la,lo,name||`${la.toFixed(2)},${lo.toFixed(2)}`);
  }catch{setLoc(la,lo,`${la.toFixed(2)},${lo.toFixed(2)}`);}
  await fetchRestaurants();
}

async function fallbackIP(){
  setLoad('IP 定位...');
  try{
    const r=await fetch('https://ip-api.com/json/?fields=status,city,district,lat,lon&lang=zh-CN');
    const d=await r.json();
    if(d.status==='success'){
      $('locStatus').textContent='IP';
      setLoc(d.lat,d.lon,[d.city,d.district].filter(Boolean).join(' ')||'附近');
      await fetchRestaurants();return;
    }
  }catch{}
  try{
    const r=await fetch('https://ipinfo.io/json');
    const d=await r.json();
    const[la,lo]=(d.loc||'25.033,121.565').split(',').map(Number);
    $('locStatus').textContent='IP';
    setLoc(la,lo,[d.city,d.region].filter(Boolean).join(' ')||'附近');
    await fetchRestaurants();
  }catch{
    $('locStatus').textContent='預設';
    setLoc(25.033,121.565,'台北市');
    await fetchRestaurants();
  }
}

function initLoc(){
  if(isIOS()&&!isStandalone())$('installHint').classList.add('show');
  if(!navigator.geolocation){fallbackIP();return}
  setLoad('取得定位...');
  const t=setTimeout(()=>{hideLoad();showPerm();fallbackIP();},3500);
  navigator.geolocation.getCurrentPosition(
    p=>{clearTimeout(t);geoOK(p.coords.latitude,p.coords.longitude)},
    _=>{clearTimeout(t);hideLoad();showPerm();fallbackIP();},
    {enableHighAccuracy:true,timeout:12000,maximumAge:300000}
  );
}

// ── OVERPASS ─────────────────────────────────────
async function fetchRestaurants(radius=1200){
  setLoad(`搜尋 ${radius}m 內餐廳...`);
  const q=`[out:json][timeout:25];(
    node["amenity"="restaurant"](around:${radius},${lat},${lng});
    node["amenity"="fast_food"](around:${radius},${lat},${lng});
    node["amenity"="cafe"](around:${radius},${lat},${lng});
    node["amenity"="food_court"](around:${radius},${lat},${lng});
    node["amenity"="ice_cream"](around:${radius},${lat},${lng});
    node["shop"="bakery"](around:${radius},${lat},${lng});
  );out body;`;
  let els=[];
  for(const ep of['https://overpass-api.de/api/interpreter','https://lz4.overpass-api.de/api/interpreter']){
    try{
      const r=await fetch(ep,{method:'POST',body:'data='+encodeURIComponent(q),
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        signal:AbortSignal.timeout(20000)});
      if(!r.ok)throw 0;
      els=(await r.json()).elements||[];break;
    }catch{}
  }
  hideLoad();
  if(els.length<5&&radius<3000){await fetchRestaurants(3000);return;}
  processRestaurants(els);
}

function classify(tags){
  const c=(tags.cuisine||'').toLowerCase();
  const a=(tags.amenity||'').toLowerCase(),s=(tags.shop||'').toLowerCase();
  for(const p of c.split(/[;,]/)){const t=p.trim().replace(/ /g,'_');if(CM[t])return CM[t];}
  if(a==='cafe')return CM.cafe;if(a==='fast_food')return CM.fast_food;
  if(a==='ice_cream')return CM.ice_cream;if(s==='bakery')return CM.bakery;
  return DEF;
}
function distM(la,lo){
  const R=6371000,dLat=(la-lat)*Math.PI/180,dLon=(lo-lng)*Math.PI/180,
    a=Math.sin(dLat/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(la*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
// ── CATEGORY GROUPS ──────────────────────────────
const FAST_FOOD_CUISINES = new Set(['fast_food','burger','american','pizza','sandwich','速食','漢堡','美式','披薩','三明治']);
const DRINK_AMENITIES    = new Set(['cafe','ice_cream','bubble_tea']);
const DRINK_CUISINES     = new Set(['cafe','coffee_shop','ice_cream','dessert','bubble_tea','咖啡','甜點','手搖']);

function getGroup(res){
  const a=(res._amenity||'').toLowerCase();
  const c=(res.cuisine||{}).l||'';
  const cRaw=(res._cuisineRaw||'').toLowerCase();
  if(DRINK_AMENITIES.has(a)||DRINK_CUISINES.has(c)||cRaw.includes('bubble')||cRaw.includes('tea')||cRaw.includes('coffee'))
    return 'drinks';
  if(a==='fast_food'||FAST_FOOD_CUISINES.has(c)) return 'fastfood';
  return 'restaurant';
}

let catPools = { restaurant:[], fastfood:[], drinks:[] };
let selectedCat = null;

function processRestaurants(els){
  allRest=els.filter(e=>e.tags&&(e.tags.name||e.tags['name:zh']))
    .map(e=>{const t=e.tags;return{
      name:t['name:zh']||t.name,
      addr:t['addr:street']?(t['addr:housenumber']||'')+t['addr:street']:(t['addr:full']||''),
      lat:e.lat,lon:e.lon,cuisine:classify(t),dist:distM(e.lat,e.lon),
      _amenity:t.amenity||'',_cuisineRaw:t.cuisine||'',
    }}).sort((a,b)=>a.dist-b.dist);

  catPools={restaurant:[],fastfood:[],drinks:[]};
  for(const r of allRest) catPools[getGroup(r)].push(r);

  // update counts
  $('cnt-restaurant').textContent=catPools.restaurant.length+'間';
  $('cnt-fastfood').textContent=catPools.fastfood.length+'間';
  $('cnt-drinks').textContent=catPools.drinks.length+'間';

  $('diceHint').textContent='先選上方類型';
}

function selectCat(cat){
  selectedCat=cat;
  ['restaurant','fastfood','drinks'].forEach(c=>{
    $('cat-'+c).classList.toggle('active', c===cat);
  });
  const n=catPools[cat]?.length||0;
  const label={restaurant:'餐廳',fastfood:'速食店',drinks:'飲料店'}[cat];
  $('diceHint').textContent=n>0?`從 ${n} 間${label}中隨機抽`:'這類型附近找不到';
}

// ── ROLL ─────────────────────────────────────────
function weightedPick(){
  const prefs=PREFS[getMeal()]||[];
  const scored=allRest.map(r=>{
    const bonus=prefs.includes(r.cuisine.l)?3:1;
    return{r,w:bonus*Math.max(1,1200-r.dist)};
  });
  let rnd=Math.random()*scored.reduce((s,x)=>s+x.w,0);
  for(const{r,w}of scored){rnd-=w;if(rnd<=0)return r;}
  return scored[0].r;
}

function roll(){
  if(rolling)return;
  if(!locReady){showPerm();return}
  if(!selectedCat){$('diceHint').textContent='請先選上方類型 ↑';return}
  const pool=catPools[selectedCat]||[];
  if(!pool.length){$('diceHint').textContent='這類型附近找不到';return}
  rolling=true;
  if(navigator.vibrate)navigator.vibrate(50);
  const btn=$('diceBtn');
  btn.classList.remove('rolling');void btn.offsetWidth;btn.classList.add('rolling');
  $('rcard').classList.remove('show');
  $('skeleton').style.display='flex';
  setTimeout(()=>{
    // weighted by proximity
    const scored=pool.map(r=>({r,w:Math.max(1,1200-r.dist)}));
    let rnd=Math.random()*scored.reduce((s,x)=>s+x.w,0);
    let res=scored[0].r;
    for(const{r,w}of scored){rnd-=w;if(rnd<=0){res=r;break;}}
    currentRes=res;showResult(res);
    btn.classList.remove('rolling');rolling=false;
  },740);
}

function eta(dist){const lo=Math.max(15,5+Math.ceil(dist/200));return`${lo}–${lo+10} 分`;}

function showResult(res){
  $('skeleton').style.display='none';
  $('rcEmoji').textContent=res.cuisine.e;
  $('rcName').textContent=res.name;
  $('rcCuisine').textContent=res.cuisine.l;
  $('rcAddr').textContent=res.addr||`距你 ${res.dist} m`;
  $('rcDist').textContent=res.dist>=1000?`${(res.dist/1000).toFixed(1)} km`:`${res.dist} m`;
  $('rcEta').textContent=eta(res.dist);
  $('rcard').classList.add('show');
  $('diceHint').textContent='不滿意？再按一次 🎲';
}

function openUber(){
  if(!currentRes)return;
  const q=encodeURIComponent(currentRes.name),la=lat||25.033,lo=lng||121.565,t=Date.now();
  window.location.href=`ubereats://search?q=${q}`;
  setTimeout(()=>{if(Date.now()-t<1500)window.open(`https://www.ubereats.com/tw/search?q=${q}&pl=sap%3A${la}%2C${lo}`,'_blank')},700);
}

// ── BOOT ─────────────────────────────────────────
if('serviceWorker'in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
tick();setInterval(tick,1000);initLoc();
</script>
