<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="吃什麼">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060d0a">
<title>吃什麼</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#060d0a;
  --glass:rgba(255,255,255,0.05);
  --glass-b:rgba(255,255,255,0.09);
  --g1:#06C167; --g2:#00e676; --g3:#00875a;
  --text:#edfaf3;
  --muted:rgba(210,245,225,0.45);
  --muted2:rgba(210,245,225,0.18);
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  /* fluid scale factor — everything scales with viewport height */
  --s: clamp(0.72, 1vh * 0.115, 1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overscroll-behavior:none}
body{
  background:var(--bg0);
  color:var(--text);
  font-family:'Outfit','Noto Sans TC',sans-serif;
  /* Use --vh set by JS — the only reliable way on iOS Safari */
  height: calc(var(--vh, 1vh) * 100);
  max-height: calc(var(--vh, 1vh) * 100);
  overflow:hidden;
  padding-top:var(--st);
  padding-bottom:var(--sb);
}

/* ── BLOBS ── */
.blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4}
.b1{width:55vw;height:55vw;background:radial-gradient(circle,#06C167,transparent 70%);
    top:-15vw;left:-15vw;animation:d1 14s ease-in-out infinite alternate}
.b2{width:44vw;height:44vw;background:radial-gradient(circle,#00402a,transparent 70%);
    top:35%;right:-15vw;animation:d2 18s ease-in-out infinite alternate}
.b3{width:38vw;height:38vw;background:radial-gradient(circle,#003d20,transparent 70%);
    bottom:10%;left:-12vw;animation:d1 11s ease-in-out infinite alternate-reverse}
@keyframes d1{from{transform:translate(0,0)scale(1)}to{transform:translate(6vw,4vh)scale(1.1)}}
@keyframes d2{from{transform:translate(0,0)scale(1.05)}to{transform:translate(-5vw,5vh)scale(.93)}}

/* ── PAGE: flex column, fits exact vh ── */
.page{
  position:relative;z-index:1;
  width:100%;max-width:430px;margin:0 auto;
  height:100%;
  display:flex;flex-direction:column;
  padding:clamp(8px,2vh,20px) clamp(14px,4vw,20px);
  gap:clamp(6px,1.4vh,14px);
}

/* ── GLASS ── */
.glass{
  background:var(--glass);
  border:1px solid var(--glass-b);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-radius:clamp(12px,3vw,18px);
}

/* ── HEADER ROW: two glass cards side by side ── */
.header-row{
  display:grid;grid-template-columns:1fr 1fr;
  gap:clamp(6px,1.2vw,10px);flex-shrink:0;
}
.hcard{
  display:flex;flex-direction:column;justify-content:center;
  padding:clamp(9px,1.5vh,13px) clamp(12px,3vw,16px);
  gap:3px;
}
.hcard-label{font-size:clamp(9px,1.1vh,11px);font-weight:300;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.clock{font-size:clamp(15px,2.2vh,20px);font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1}
.meal-badge{
  display:inline-block;align-self:flex-start;
  padding:clamp(2px,.5vh,4px) clamp(8px,2vw,11px);border-radius:20px;
  background:rgba(6,193,103,.18);border:1px solid rgba(6,193,103,.35);
  color:var(--g2);font-size:clamp(10px,1.2vh,12px);font-weight:600;letter-spacing:.5px;
}
.loc-name{font-size:clamp(11px,1.5vh,13px);font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.loc-st{
  display:inline-block;align-self:flex-start;
  font-size:clamp(9px,1.1vh,11px);font-weight:600;letter-spacing:.5px;
  padding:2px 8px;border-radius:10px;
  background:rgba(6,193,103,.15);border:1px solid rgba(6,193,103,.3);color:#4dffa0;
}
.loc-st.pending{background:rgba(255,200,0,.1);border-color:rgba(255,200,0,.2);color:#ffd75e}


/* hero — shrinks gracefully */
.hero{padding:0 4px;flex-shrink:0}
.hero-sub{
  font-size:clamp(8px,1vh,10px);font-weight:400;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:clamp(2px,.4vh,5px);
}
.hero-title{
  font-size:clamp(1.4rem,4.8vh,2.6rem);
  font-weight:800;line-height:.95;letter-spacing:-2px;color:var(--text);
}
.hero-title .grad{
  background:linear-gradient(135deg,var(--g1),var(--g2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* categories */
.cat-lbl{
  font-size:clamp(8px,1vh,10px);color:var(--muted);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:clamp(4px,.7vh,7px);padding-left:2px;
}
.cat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(5px,1vw,8px)}
.cat-btn{
  background:var(--glass);border:1px solid var(--glass-b);
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border-radius:clamp(10px,2vw,14px);
  padding:clamp(8px,1.3vh,12px) 4px clamp(6px,1vh,10px);
  display:flex;flex-direction:column;align-items:center;gap:clamp(2px,.5vh,4px);
  cursor:pointer;touch-action:manipulation;
  transition:border-color .2s,background .2s,transform .12s,box-shadow .2s;
}
.cat-btn:active{transform:scale(.93)}
.cat-btn.active{
  border-color:rgba(6,193,103,.6);background:rgba(6,193,103,.12);
  box-shadow:0 0 16px rgba(6,193,103,.2),inset 0 1px 0 rgba(255,255,255,.08);
}
.cat-e{font-size:clamp(1.1rem,2.5vh,1.5rem);line-height:1;transition:filter .2s}
.cat-btn.active .cat-e{filter:drop-shadow(0 0 8px rgba(6,193,103,.8))}
.cat-n{font-size:clamp(9px,1.2vh,12px);font-weight:600;color:var(--muted);transition:color .2s;text-align:center}
.cat-btn.active .cat-n{color:#a0ffd0}
.cat-c{font-size:clamp(8px,.95vh,10px);color:var(--muted2);font-weight:300;transition:color .2s;text-align:center;line-height:1.3}
.cat-btn.active .cat-c{color:rgba(6,193,103,.65)}

/* result — flex-grow to fill remaining space */
.result-wrap{flex:1;min-height:0;display:flex;flex-direction:column}
.skeleton{display:flex;flex-direction:column;justify-content:center;gap:10px;padding:16px;flex:1}
.sk{border-radius:6px;
  background:linear-gradient(90deg,rgba(6,193,103,.05) 0%,rgba(6,193,103,.12) 50%,rgba(6,193,103,.05) 100%);
  background-size:200% 100%;animation:shimmer 1.8s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk:nth-child(1){height:14px;width:65%}
.sk:nth-child(2){height:11px;width:40%}
.sk:nth-child(3){height:11px;width:50%}

.rcard{display:none;flex-direction:column;overflow:hidden;flex:1}
.rcard.show{display:flex;animation:cardIn .5s cubic-bezier(.34,1.4,.64,1) both}
@keyframes cardIn{0%{opacity:0;transform:scale(.92) translateY(12px)}100%{opacity:1;transform:scale(1) translateY(0)}}

.rcard-header{
  flex:1;
  padding:clamp(12px,2vh,18px) clamp(14px,3.5vw,20px);
  background:linear-gradient(135deg,rgba(6,193,103,.13),rgba(0,230,118,.05));
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;
}
.rcard-header::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(6,193,103,.18),transparent 70%);
}
.dist-pill{
  position:absolute;top:0;right:0;
  background:linear-gradient(135deg,var(--g1),var(--g3));
  color:#fff;font-size:clamp(10px,1.3vh,12px);font-weight:700;
  padding:3px 10px;border-radius:0 0 0 10px;letter-spacing:-.3px;
}
.rcard-row{display:flex;gap:12px;align-items:center;position:relative}
.rcard-emoji{
  font-size:clamp(2rem,4.5vh,2.8rem);line-height:1;flex-shrink:0;
  filter:drop-shadow(0 3px 10px rgba(6,193,103,.4));
}
.rcard-text{flex:1;min-width:0}
.rcard-name{
  font-size:clamp(1rem,2.5vh,1.3rem);font-weight:700;
  color:var(--text);letter-spacing:-.5px;line-height:1.2;
}
.rcard-cuisine{font-size:clamp(9px,1.1vh,11px);color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.rcard-addr{
  font-size:clamp(10px,1.3vh,12px);color:var(--muted);margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.rcard-footer{
  display:flex;align-items:center;
  padding:clamp(10px,1.6vh,14px) clamp(14px,3.5vw,20px);
  gap:8px;border-top:1px solid rgba(6,193,103,.1);flex-shrink:0;
}
.eta-box{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.eta-lbl{font-size:clamp(9px,1.1vh,10px);color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.eta-val{font-size:clamp(14px,2vh,17px);font-weight:700;color:var(--text);letter-spacing:-.5px}
.footer-btns{flex:1;display:flex;gap:7px}
.btn-maps{
  flex:1;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);
  color:var(--text);border-radius:12px;
  padding:clamp(10px,1.6vh,14px) 6px;
  font-family:'Outfit','Noto Sans TC',sans-serif;
  font-size:clamp(11px,1.4vh,13px);font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:transform .15s,background .15s;touch-action:manipulation;
}
.btn-maps:active{transform:scale(.96);background:rgba(255,255,255,.12)}
.btn-uber{
  flex:1;
  background:linear-gradient(135deg,var(--g1),var(--g3));
  color:#fff;border:none;border-radius:12px;
  padding:clamp(10px,1.6vh,14px) 6px;
  font-family:'Outfit','Noto Sans TC',sans-serif;
  font-size:clamp(11px,1.4vh,13px);font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  box-shadow:0 3px 16px rgba(6,193,103,.32);
  transition:transform .15s,filter .15s;touch-action:manipulation;
}
.btn-uber:active{transform:scale(.96);filter:brightness(.88)}

/* dice */
.dice-btn{
  width:100%;height:clamp(52px,7.5vh,68px);flex-shrink:0;
  background:var(--glass);border:1px solid var(--glass-b);
  backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
  border-radius:clamp(14px,3vw,20px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:12px;
  touch-action:manipulation;position:relative;overflow:hidden;
  transition:transform .12s,border-color .2s;
}
.dice-btn::before{
  content:'';position:absolute;inset:-1px;border-radius:21px;z-index:-1;
  background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));opacity:0;transition:opacity .3s;
}
.dice-btn:hover::before{opacity:1}
.dice-btn::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(6,193,103,.08),rgba(0,230,118,.03));pointer-events:none;
}
.dice-btn:active{transform:scale(.97)}
.dice-btn.rolling{border-color:rgba(6,193,103,.55);animation:btnGlow .7s ease}
@keyframes btnGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 28px rgba(6,193,103,.4),0 0 56px rgba(0,230,118,.18)}}
.dice-icon{
  font-size:clamp(1.6rem,3.5vh,2.2rem);
  filter:drop-shadow(0 2px 8px rgba(6,193,103,.7));display:inline-block;
}
.dice-btn.rolling .dice-icon{animation:diceRoll .7s ease}
@keyframes diceRoll{0%{transform:rotate(0)scale(1)}25%{transform:rotate(-25deg)scale(.85)}70%{transform:rotate(380deg)scale(1.2)}100%{transform:rotate(360deg)scale(1)}}
.dice-lbl{display:flex;flex-direction:column;gap:1px}
.dice-main{font-size:clamp(.95rem,1.9vh,1.1rem);font-weight:700;color:var(--text);letter-spacing:-.3px}
.dice-hint{font-size:clamp(9px,1.2vh,11px);color:var(--muted);font-weight:300}

.install-hint{
  text-align:center;font-size:clamp(10px,1.3vh,12px);
  color:var(--muted);padding:6px 10px;line-height:1.5;display:none;flex-shrink:0;
}
.install-hint.show{display:block}
.install-hint strong{color:var(--g2)}

/* ── OPEN STATUS TAG ── */
.oh-tag{
  display:inline-block;margin-top:clamp(4px,.7vh,8px);
  font-size:clamp(9px,1.1vh,11px);font-weight:600;letter-spacing:.5px;
  padding:2px 9px;border-radius:20px;
}
.oh-open{background:rgba(6,193,103,.15);border:1px solid rgba(6,193,103,.35);color:#4dffa0;}
.oh-unknown{background:rgba(255,200,0,.1);border:1px solid rgba(255,200,0,.2);color:rgba(255,220,80,.7);}

/* ── HISTORY ── */
.history-wrap{
  flex-shrink:0;
  /* show exactly one row, overflow scrollable */
  max-height:clamp(52px,8vh,68px);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  /* hide scrollbar visually */
  scrollbar-width:none;
}
.history-wrap::-webkit-scrollbar{display:none}
.history-wrap.has-more{
  /* grow to show ~1.3 rows hinting there's more */
  max-height:clamp(66px,10vh,84px);
}
.hist-label{
  font-size:clamp(9px,1.1vh,11px);color:var(--muted);
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:clamp(4px,.7vh,7px);padding-left:2px;
  flex-shrink:0;
}
.hist-row{
  display:flex;align-items:center;gap:8px;
  padding:clamp(7px,1.2vh,10px) clamp(12px,3vw,16px);
  border-bottom:1px solid rgba(255,255,255,.04);
}
.hist-row:last-child{border-bottom:none}
.hist-emoji{font-size:clamp(1.1rem,2vh,1.3rem);flex-shrink:0}
.hist-name{flex:1;font-size:clamp(11px,1.4vh,13px);font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-cat{font-size:clamp(9px,1.1vh,11px);color:var(--muted);flex-shrink:0}
.hist-time{font-size:clamp(9px,1.1vh,10px);color:var(--muted2);font-family:monospace;flex-shrink:0}
.hist-btn{
  flex-shrink:0;
  background:var(--g1);
  border:none;border-radius:20px;
  padding:0 clamp(8px,1.8vw,12px);
  height:clamp(20px,2.8vh,26px);
  font-size:clamp(9px,1.1vh,11px);font-weight:700;
  color:#fff;cursor:pointer;
  letter-spacing:.3px;
  box-shadow:0 2px 8px rgba(6,193,103,.4);
  transition:filter .15s,transform .12s;
  touch-action:manipulation;
  white-space:nowrap;
}
.hist-btn:active{filter:brightness(.85);transform:scale(.95)}
.hist-map{
  flex-shrink:0;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;
  padding:0 clamp(7px,1.6vw,10px);
  height:clamp(20px,2.8vh,26px);
  font-size:clamp(9px,1.1vh,11px);font-weight:600;
  color:var(--muted);cursor:pointer;
  transition:filter .15s,transform .12s;
  touch-action:manipulation;
  white-space:nowrap;display:flex;align-items:center;gap:3px;
}
.hist-map:active{filter:brightness(1.3);transform:scale(.95)}
.hist-empty{
  padding:clamp(7px,1.2vh,10px) clamp(12px,3vw,16px);
  font-size:clamp(10px,1.3vh,12px);color:var(--muted2);
}

.perm-overlay{
  position:fixed;inset:0;z-index:100;background:rgba(6,13,9,.92);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;text-align:center;gap:16px;
}
.perm-overlay.gone{display:none}
.perm-glow{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,var(--g1),var(--g3));
  display:flex;align-items:center;justify-content:center;font-size:2.5rem;
  box-shadow:0 0 50px rgba(6,193,103,.5);margin-bottom:8px;
}
.perm-title{font-size:1.5rem;font-weight:700;color:var(--text);letter-spacing:-.5px}
.perm-desc{font-size:14px;color:var(--muted);line-height:1.7}
.perm-desc strong{color:var(--text)}
.btn-allow{
  background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff;border:none;
  border-radius:16px;padding:15px 40px;
  font-family:'Outfit','Noto Sans TC',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;margin-top:8px;
  box-shadow:0 4px 24px rgba(6,193,103,.4);transition:transform .15s;touch-action:manipulation;
}
.btn-allow:active{transform:scale(.96)}

.load-overlay{
  position:fixed;inset:0;z-index:200;background:var(--bg0);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
.load-overlay.gone{display:none}
.load-ring{
  width:48px;height:48px;
  border:3px solid rgba(6,193,103,.12);border-top-color:var(--g1);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:13px;color:var(--muted);font-weight:300;letter-spacing:1px}
</style>
</head>
<body>

<div class="blobs">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
</div>

<div class="load-overlay" id="loadOverlay">
  <div class="load-ring"></div>
  <div class="load-text" id="loadText">定位中...</div>
</div>

<div class="perm-overlay gone" id="permOverlay">
  <div class="perm-glow">📍</div>
  <div class="perm-title">需要你的位置</div>
  <div class="perm-desc">才能找到附近的<strong>真實餐廳</strong><br>請允許取得定位</div>
  <button class="btn-allow" onclick="requestGPS()">允許定位</button>
</div>

<div class="page">

  <!-- ── HEADER: time+meal  |  location+gps ── -->
  <div class="header-row">
    <div class="glass hcard">
      <div class="hcard-label">Hi，今天</div>
      <div class="clock" id="clock">--:--</div>
      <div class="meal-badge" id="mealBadge">偵測中</div>
    </div>
    <div class="glass hcard">
      <div class="hcard-label">你的位置</div>
      <div class="loc-name" id="locName">定位中...</div>
      <div class="loc-st pending" id="locSt">等待</div>
    </div>
  </div>

  <div class="hero">
    <div class="hero-sub">附近真實餐廳推薦</div>
    <div class="hero-title">今天<br>吃<span class="grad">什麼</span>？</div>
  </div>

  <!-- ── CATEGORY ── -->
  <div>
    <div class="cat-lbl">選一個類型</div>
    <div class="cat-row">
      <button class="cat-btn active" data-cat="restaurant" onclick="pickCat(this)">
        <span class="cat-e">🍽️</span>
        <span class="cat-n">餐廳</span>
        <span class="cat-c" id="cnt-restaurant">載入中</span>
      </button>
      <button class="cat-btn" data-cat="fastfood" onclick="pickCat(this)">
        <span class="cat-e">🍔</span>
        <span class="cat-n">速食店</span>
        <span class="cat-c" id="cnt-fastfood">載入中</span>
      </button>
      <button class="cat-btn" data-cat="drinks" onclick="pickCat(this)">
        <span class="cat-e">🧋</span>
        <span class="cat-n">飲料店</span>
        <span class="cat-c" id="cnt-drinks">載入中</span>
      </button>
      <button class="cat-btn" data-cat="cafe" onclick="pickCat(this)">
        <span class="cat-e">☕</span>
        <span class="cat-n">咖啡館</span>
        <span class="cat-c" id="cnt-cafe">載入中</span>
      </button>
    </div>
  </div>

  <!-- ── RESULT ── -->
  <div class="result-wrap">
    <div class="glass skeleton" id="skeleton">

</div>

<script>
// ── GROUPS ───────────────────────────────────────
// restaurant: sit-down meals, actual food dishes
const RESTAURANT_CUISINES=new Set([
  'taiwanese','japanese','korean','chinese','italian','american','thai','vietnamese',
  'indian','cantonese','dim_sum','hotpot','bbq','steak','western','pizza','noodle',
  'ramen','sushi','dumpling','rice','seafood','french','mexican','turkish','greek',
  'spanish','portuguese','middle_eastern','african','asian','fusion','international'
]);
// fastfood: chain fast food — McDonald's / KFC style, amenity=fast_food OR known chains
const FASTFOOD_BRANDS=new Set([
  'mcdonalds','mcdonald\'s','kfc','burger king','wendy\'s','subway','pizza hut',
  'domino\'s','dominos','mos burger','摩斯漢堡','麥當勞','肯德基','漢堡王',
  'jollibee','carl\'s jr','hardee\'s','五guys','shake shack','in-n-out'
]);
const FASTFOOD_CUISINES=new Set(['burger','fried_chicken','fish_and_chips']);

// drinks: hand-shaken bubble tea / juice shops — NOT coffee
const DRINKS_CUISINES=new Set([
  'bubble_tea','juice','smoothie','tea','boba','shaved_ice'
]);
const DRINKS_NAMES=/(手搖|珍奶|茶飲|50嵐|貢茶|清心|天仁|鶴茶樓|麻古|迷客夏|茶湯會|一芳|春水堂|可不可|大苑子|七盞茶|丘比|初瓦|快可立)/;

// cafe: coffee-focused — amenity=cafe OR cuisine=coffee
const CAFE_CUISINES=new Set(['coffee','coffee_shop','espresso']);
const CAFE_NAMES=/(咖啡|珈琲|スターバックス|starbucks|85度c|85°c|路易莎|louisa|cama|丹堤|伯朗|真鍋|西雅圖|怡客|is coffee)/i;


const AMENITY_TO_GROUP={
  restaurant:'restaurant',
  fast_food:'fastfood',
  food_court:'restaurant',
  cafe:'cafe',        // amenity=cafe → coffee shop by default
  ice_cream:'drinks',
};
const SHOP_TO_GROUP={bakery:'cafe'};

const EMOJI_MAP={
  taiwanese:'🍱',noodle:'🍜',ramen:'🍜',rice:'🍚',dumpling:'🥟',dim_sum:'🥟',
  cantonese:'🥟',hotpot:'🫕',bbq:'🍢',japanese:'🍣',sushi:'🍣',korean:'🥘',
  chinese:'🥢',american:'🍔',burger:'🍔',pizza:'🍕',italian:'🍝',steak:'🥩',
  western:'🥗',thai:'🌶️',vietnamese:'🍲',indian:'🍛',fast_food:'🍟',sandwich:'🥪',
  coffee_shop:'☕',cafe:'☕',coffee:'☕',ice_cream:'🍦',dessert:'🍰',bubble_tea:'🧋',
  breakfast:'🥚',bakery:'🥐',seafood:'🦐',french:'🥐',mexican:'🌮',kebab:'🌯',
  juice:'🥤',smoothie:'🥤',tea:'🍵',
};
const GROUP_EMOJI={restaurant:'🍽️',fastfood:'🍔',drinks:'🧋',cafe:'☕'};

const MEALS={breakfast:'早餐',brunch:'早午餐',lunch:'午餐',afternoon:'下午茶',dinner:'晚餐',latenight:'宵夜'};

// ── STATE ────────────────────────────────────────
let lat=null,lng=null,locReady=false;
let pools={restaurant:[],fastfood:[],drinks:[],cafe:[]};
let selectedCat='restaurant',rolling=false,currentRes=null;
let history=[];

// ── CLOCK ────────────────────────────────────────
function getMeal(){
  const h=new Date().getHours();
  if(h>=6&&h<10)return'breakfast';if(h>=10&&h<11)return'brunch';
  if(h>=11&&h<14)return'lunch';if(h>=14&&h<17)return'afternoon';
  if(h>=17&&h<22)return'dinner';return'latenight';
}
function tick(){
  const now=new Date(),p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent=`${p(now.getHours())}:${p(now.getMinutes())}`;
  document.getElementById('mealBadge').textContent=MEALS[getMeal()]||'';
}

const $=id=>document.getElementById(id);
function isIOS(){return/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream}
function isStandalone(){return window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches}
function setLoad(t){$('loadText').textContent=t;$('loadOverlay').classList.remove('gone')}
function hideLoad(){$('loadOverlay').classList.add('gone')}
function showPerm(){$('permOverlay').classList.remove('gone')}
function hidePerm(){$('permOverlay').classList.add('gone')}

// ── LOCATION ─────────────────────────────────────
function setLoc(la,lo,name,sub){
  lat=la;lng=lo;locReady=true;
  $('locName').textContent=name;
  $('locSt').textContent=sub||'GPS ✓';
  $('locSt').classList.remove('pending');
  hidePerm();
}
function requestGPS(){
  hidePerm();setLoad('取得 GPS...');
  navigator.geolocation.getCurrentPosition(
    p=>geoOK(p.coords.latitude,p.coords.longitude),
    _=>fallbackIP(),{enableHighAccuracy:true,timeout:12000,maximumAge:60000});
}
async function geoOK(la,lo){
  setLoad('解析地址...');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${la}&lon=${lo}&format=json&accept-language=zh-TW`);
    const d=await r.json(),a=d.address||{};
    const name=[a.suburb||a.neighbourhood||a.quarter||a.village,
                a.city||a.town||a.county].filter(Boolean).slice(0,2).join(' ');
    setLoc(la,lo,name||`${la.toFixed(2)},${lo.toFixed(2)}`,'GPS ✓');
  }catch{setLoc(la,lo,`${la.toFixed(2)},${lo.toFixed(2)}`,'GPS ✓');}
  await fetchRestaurants();
}
async function fallbackIP(){
  setLoad('IP 定位...');
  try{
    const r=await fetch('https://ip-api.com/json/?fields=status,city,district,lat,lon&lang=zh-CN');
    const d=await r.json();
    if(d.status==='success'){
      setLoc(d.lat,d.lon,[d.city,d.district].filter(Boolean).join(' ')||'附近','IP');
      await fetchRestaurants();return;
    }
  }catch{}
  try{
    const r=await fetch('https://ipinfo.io/json');
    const d=await r.json();
    const[la,lo]=(d.loc||'25.033,121.565').split(',').map(Number);
    setLoc(la,lo,[d.city,d.region].filter(Boolean).join(' ')||'附近','IP');
    await fetchRestaurants();
  }catch{setLoc(25.033,121.565,'台北市','預設');await fetchRestaurants();}
}
function initLoc(){
  if(isIOS()&&!isStandalone())$('installHint').classList.add('show');
  if(!navigator.geolocation){fallbackIP();return}
  setLoad('取得定位...');
  const t=setTimeout(()=>{hideLoad();showPerm();fallbackIP();},3500);
  navigator.geolocation.getCurrentPosition(
    p=>{clearTimeout(t);geoOK(p.coords.latitude,p.coords.longitude)},
    _=>{clearTimeout(t);hideLoad();showPerm();fallbackIP();},
    {enableHighAccuracy:true,timeout:12000,maximumAge:300000});
}

// ── OPENING HOURS PARSER ─────────────────────────
// Parses OSM opening_hours format and checks if currently open
// Supports: Mo-Fr 10:00-22:00; Sa 11:00-20:00; PH off; 24/7 etc.

const DAY_MAP = { mo:0,tu:1,we:2,th:3,fr:4,sa:5,su:6 };
const DAY_NAMES = ['mo','tu','we','th','fr','sa','su'];

function isOpenNow(oh) {
  if (!oh || oh.trim() === '') return null; // unknown → include by default
  oh = oh.toLowerCase().trim();
  if (oh === '24/7') return true;
  if (oh === 'yes' || oh === 'open') return true;
  if (oh === 'no'  || oh === 'closed') return false;

  const now  = new Date();
  const dow  = (now.getDay() + 6) % 7; // 0=Mo … 6=Su
  const mins = now.getHours() * 60 + now.getMinutes();

  // split by semicolon into rules
  const rules = oh.split(/\s*;\s*/);
  let result = null; // null = no rule matched

  for (const rule of rules) {
    const r = rule.trim();
    if (!r) continue;

    // --- "off" / "closed" rule ---
    if (/\boff\b|\bclosed\b/.test(r)) {
      // e.g. "PH off" — skip PH, treat as closed segment
      result = false;
      continue;
    }

    // --- parse day range ---
    // patterns: "mo-fr", "mo,we,fr", "mo", or no day (means every day)
    let dayMatch = r.match(/^([a-z]{2}(?:[-,][a-z]{2})*)\s+/);
    let applicableDays = null; // null = applies every day

    if (dayMatch) {
      const dayStr = dayMatch[1];
      applicableDays = new Set();
      // handle comma-separated or range
      const parts = dayStr.split(',');
      for (const part of parts) {
        if (part.includes('-')) {
          const [s, e] = part.split('-');
          const si = DAY_MAP[s], ei = DAY_MAP[e];
          if (si !== undefined && ei !== undefined) {
            // handle wrap-around (e.g. fr-su)
            if (si <= ei) {
              for (let d = si; d <= ei; d++) applicableDays.add(d);
            } else {
              for (let d = si; d <= 6; d++) applicableDays.add(d);
              for (let d = 0; d <= ei; d++) applicableDays.add(d);
            }
          }
        } else {
          const di = DAY_MAP[part.trim()];
          if (di !== undefined) applicableDays.add(di);
        }
      }
      if (!applicableDays.has(dow)) continue; // this rule doesn't apply today
    }

    // --- parse time range ---
    // extract all HH:MM-HH:MM patterns
    const timeRe = /(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/g;
    let timeMatch;
    let foundTime = false;
    while ((timeMatch = timeRe.exec(r)) !== null) {
      foundTime = true;
      const [sh, sm] = timeMatch[1].split(':').map(Number);
      const [eh, em] = timeMatch[2].split(':').map(Number);
      const start = sh * 60 + sm;
      let   end   = eh * 60 + em;
      if (end < start) end += 24 * 60; // overnight e.g. 22:00-02:00
      if (mins >= start && mins <= end) { result = true; break; }
    }
    if (foundTime && result !== true) result = false; // rule applies today but not in time range
    if (!foundTime && applicableDays !== null) result = true; // day matched, no time = all day
  }

  return result; // null = no data, true = open, false = closed
}

function openStatus(oh) {
  const s = isOpenNow(oh);
  if (s === true)  return 'open';
  if (s === false) return 'closed';
  return 'unknown'; // no opening_hours data
}

async function fetchRestaurants(radius=1200){
  setLoad(`搜尋 ${radius}m 內...`);
  const q=`[out:json][timeout:25];(
    node["amenity"="restaurant"](around:${radius},${lat},${lng});
    node["amenity"="fast_food"](around:${radius},${lat},${lng});
    node["amenity"="cafe"](around:${radius},${lat},${lng});
    node["amenity"="food_court"](around:${radius},${lat},${lng});
    node["amenity"="ice_cream"](around:${radius},${lat},${lng});
    node["shop"="bakery"](around:${radius},${lat},${lng});
  );out body;`;
  let els=[];
  for(const ep of['https://overpass-api.de/api/interpreter','https://lz4.overpass-api.de/api/interpreter']){
    try{
      const r=await fetch(ep,{method:'POST',body:'data='+encodeURIComponent(q),
        headers:{'Content-Type':'application/x-www-form-urlencoded'},signal:AbortSignal.timeout(20000)});
      if(!r.ok)throw 0;els=(await r.json()).elements||[];break;
    }catch{}
  }
  hideLoad();
  if(els.length<5&&radius<3000){await fetchRestaurants(3000);return;}
  processRestaurants(els);
}

function distM(la,lo){
  const R=6371000,dLat=(la-lat)*Math.PI/180,dLon=(lo-lng)*Math.PI/180,
    a=Math.sin(dLat/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(la*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function classifyGroup(tags){
  const amenity=(tags.amenity||'').toLowerCase();
  const shop=(tags.shop||'').toLowerCase();
  const name=(tags['name:zh']||tags.name||'').toLowerCase();
  const brand=(tags.brand||'').toLowerCase();
  const cuisines=(tags.cuisine||'').toLowerCase().split(/[;,]/).map(s=>s.trim().replace(/ /g,'_'));

  // 1. Cafe: coffee cuisine OR known coffee brand name
  if(cuisines.some(c=>CAFE_CUISINES.has(c))) return 'cafe';
  if(amenity==='cafe' && !DRINKS_NAMES.test(name)) return 'cafe';
  if(CAFE_NAMES.test(name)||CAFE_NAMES.test(brand)) return 'cafe';

  // 2. Drinks: bubble tea / juice shops
  if(cuisines.some(c=>DRINKS_CUISINES.has(c))) return 'drinks';
  if(DRINKS_NAMES.test(name)||DRINKS_NAMES.test(brand)) return 'drinks';
  if(amenity==='ice_cream') return 'drinks';

  // 3. Fast food: amenity=fast_food OR known chain brand
  if(amenity==='fast_food') return 'fastfood';
  if(FASTFOOD_CUISINES.has(cuisines[0])) return 'fastfood';
  const nameNorm=name.replace(/['\s]/g,'');
  const brandNorm=brand.replace(/['\s]/g,'');
  if([...FASTFOOD_BRANDS].some(b=>nameNorm.includes(b.replace(/['\s]/g,''))||brandNorm.includes(b.replace(/['\s]/g,'')))) return 'fastfood';

  // 4. Restaurant: sit-down with cuisine tag, or generic amenity=restaurant
  if(cuisines.some(c=>RESTAURANT_CUISINES.has(c))) return 'restaurant';
  if(AMENITY_TO_GROUP[amenity]) return AMENITY_TO_GROUP[amenity];
  if(SHOP_TO_GROUP[shop]) return SHOP_TO_GROUP[shop];
  return 'restaurant';
}

function getEmoji(tags){
  const cuisines=(tags.cuisine||'').toLowerCase().split(/[;,]/).map(s=>s.trim().replace(/ /g,'_'));
  for(const c of cuisines){if(EMOJI_MAP[c])return EMOJI_MAP[c];}
  const a=(tags.amenity||'').toLowerCase();
  if(a==='cafe')return'☕';if(a==='ice_cream')return'🍦';if(a==='fast_food')return'🍟';
  if((tags.shop||'')==='bakery')return'🥐';
  return null;
}

function processRestaurants(els){
  pools={restaurant:[],fastfood:[],drinks:[],cafe:[]};
  for(const e of els){
    if(!e.tags||(!(e.tags.name||e.tags['name:zh'])))continue;
    const t=e.tags,group=classifyGroup(t);
    const rawCuisine=(t.cuisine||'').split(/[;,]/)[0].trim();
    const cuisineLabel=rawCuisine||
      (t.amenity==='cafe'?'咖啡館':t.amenity==='fast_food'?'速食店':'餐廳');
    pools[group].push({
      name:t['name:zh']||t.name,
      addr:t['addr:street']?(t['addr:housenumber']||'')+t['addr:street']:(t['addr:full']||''),
      lat:e.lat,lon:e.lon,
      emoji:getEmoji(t)||GROUP_EMOJI[group],
      cuisine:cuisineLabel,
      dist:distM(e.lat,e.lon),
      oh: t.opening_hours || '',
      ohStatus: openStatus(t.opening_hours || ''),
    });
  }
  for(const k of Object.keys(pools)){
    pools[k].sort((a,b)=>a.dist-b.dist);
    pools[k] = pools[k].filter(r => r.ohStatus !== 'closed');
  }

  const fmtCount = (arr) => {
    const open    = arr.filter(r=>r.ohStatus==='open').length;
    const unknown = arr.filter(r=>r.ohStatus==='unknown').length;
    if(!arr.length) return '無資料';
    if(open===0 && unknown===0) return '無資料';
    if(open>0  && unknown>0)  return `${open} open / ${unknown} unknown`;
    if(open>0  && unknown===0) return `${open} open`;
    return `${unknown} unknown`;
  };

  $('cnt-restaurant').textContent = fmtCount(pools.restaurant);
  $('cnt-fastfood').textContent   = fmtCount(pools.fastfood);
  $('cnt-drinks').textContent     = fmtCount(pools.drinks);
  $('cnt-cafe').textContent       = fmtCount(pools.cafe);

  const total=Object.values(pools).reduce((s,p)=>s+p.length,0);
  const cur=pools[selectedCat]?.length||0;
  $('diceHint').textContent=cur>0?`從 ${cur} 間中隨機抽・按下骰子！`:'此類型無資料';
  if(total===0)$('diceHint').textContent='找不到附近資料';
}

// ── CATEGORY ─────────────────────────────────────
function pickCat(btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedCat=btn.dataset.cat;
  $('rcard').classList.remove('show');
  $('skeleton').style.display='flex';
  const cnt=pools[selectedCat]?.length||0;
  $('diceHint').textContent=cnt>0?`從 ${cnt} 間中隨機抽・按下骰子！`:'此類型無資料';
}

// ── ROLL ─────────────────────────────────────────
function roll(){
  if(rolling)return;
  if(!locReady){showPerm();return}
  const pool=pools[selectedCat]||[];
  if(!pool.length){$('diceHint').textContent='此類型附近沒有資料';return}
  rolling=true;
  if(navigator.vibrate)navigator.vibrate(50);
  const btn=$('diceBtn');
  btn.classList.remove('rolling');void btn.offsetWidth;btn.classList.add('rolling');
  $('rcard').classList.remove('show');$('skeleton').style.display='flex';
  setTimeout(()=>{
    const scored=pool.map(r=>({r,w:Math.max(1,1500-r.dist)}));
    let rnd=Math.random()*scored.reduce((s,x)=>s+x.w,0),res=scored[0].r;
    for(const{r,w}of scored){rnd-=w;if(rnd<=0){res=r;break;}}
    currentRes=res;showResult(res);btn.classList.remove('rolling');rolling=false;
  },740);
}

function eta(d){const lo=Math.max(15,5+Math.ceil(d/200));return`${lo}–${lo+10} 分`;}

function addHistory(res){
  const now=new Date(),p=n=>String(n).padStart(2,'0');
  history.unshift({res, time:`${p(now.getHours())}:${p(now.getMinutes())}`});
  const wrap=$('histWrap');
  wrap.innerHTML=history.map(h=>{
    const q=encodeURIComponent(h.res.name);
    const la=lat||25.033,lo=lng||121.565;
    const uberUrl=`https://www.ubereats.com/tw/search?q=${q}&pl=sap%3A${la}%2C${lo}`;
    const mapsQuery=encodeURIComponent(h.res.name+(h.res.addr?' '+h.res.addr:''));
    const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${mapsQuery}`;
    return`<div class="hist-row">
      <span class="hist-emoji">${h.res.emoji}</span>
      <span class="hist-name">${h.res.name}</span>
      <span class="hist-cat">${h.res.cuisine}</span>
      <span class="hist-time">${h.time}</span>
      <button class="hist-map" onclick="window.open('${mapsUrl}','_blank')">🗺 時段</button>
      <button class="hist-btn" onclick="openHistUber('${uberUrl}')">● 訂</button>
    </div>`;
  }).join('');
  if(history.length>1) wrap.classList.add('has-more');
  wrap.scrollTop=0;
}

function openHistUber(url){
  window.open(url,'_blank');
}

function showResult(res){
  $('skeleton').style.display='none';
  $('rcEmoji').textContent=res.emoji;
  $('rcName').textContent=res.name;
  $('rcCuisine').textContent=res.cuisine;
  $('rcAddr').textContent=res.addr||`距你 ${res.dist} m`;
  $('rcDist').textContent=res.dist>=1000?`${(res.dist/1000).toFixed(1)} km`:`${res.dist} m`;
  $('rcEta').textContent=eta(res.dist);

  // show open status
  const ohEl = $('rcOH');
  if(res.ohStatus==='open'){
    ohEl.textContent = '● 營業中';
    ohEl.className = 'oh-tag oh-open';
  } else if(res.ohStatus==='unknown'){
    ohEl.textContent = '? 未知營業時間';
    ohEl.className = 'oh-tag oh-unknown';
  }
  ohEl.title = res.oh || '';

  $('rcard').classList.add('show');
  $('diceHint').textContent='不滿意？再按一次';
  addHistory(res);
}

function openMaps(){
  if(!currentRes)return;
  const q=encodeURIComponent(currentRes.name+(currentRes.addr?' '+currentRes.addr:''));
  // comgooglemaps:// opens Google Maps app on iOS; fallback to web
  const native=`comgooglemaps://?q=${q}`;
  const web=`https://www.google.com/maps/search/?api=1&query=${q}`;
  const t=Date.now();
  window.location.href=native;
  setTimeout(()=>{ if(Date.now()-t<1200) window.open(web,'_blank'); },600);
}

function openUber(){
  if(!currentRes)return;
  const q=encodeURIComponent(currentRes.name),la=lat||25.033,lo=lng||121.565,t=Date.now();
  window.location.href=`ubereats://search?q=${q}`;
  setTimeout(()=>{if(Date.now()-t<1500)window.open(`https://www.ubereats.com/tw/search?q=${q}&pl=sap%3A${la}%2C${lo}`,'_blank')},700);
}

if('serviceWorker'in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

// ── VISUAL VIEWPORT FIX (iOS Safari browser chrome) ──────────────
// dvh/svh are unreliable on iOS Safari — measure the actual visible
// height and expose it as --vh so body height is always pixel-perfect.
function setVH(){
  const h = window.visualViewport
    ? window.visualViewport.height
    : window.innerHeight;
  document.documentElement.style.setProperty('--vh', `${h * 0.01}px`);
}
setVH();
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', setVH);
} else {
  window.addEventListener('resize', setVH);
}

tick();setInterval(tick,1000);initLoc();
